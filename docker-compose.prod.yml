services:
  web:
    build: .
    container_name: domu_api
    environment:
      SECRET_KEY: ${SECRET_KEY:-supersecretkey}
      ALGORITHM: ${ALGORITHM:-HS256}
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-password}@db:5432/domu_db
      VIRTUAL_HOST: ${API_HOST:-localhost}
      VIRTUAL_PORT: 8000
      LETSENCRYPT_HOST: ${API_HOST:-localhost}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: ./frontend
      target: runner
      args:
        APP_ENV: production
        NEXT_PUBLIC_API_URL: ${API_HOST:-https://api.domu.ar}
    container_name: domu_frontend
    environment:
      - INTERNAL_API_URL=http://web:8000
      - JWT_SECRET_KEY=${SECRET_KEY:-supersecretkey}
      - VIRTUAL_HOST=${HOST:-localhost}
      - VIRTUAL_PORT=8000
      - LETSENCRYPT_HOST=${HOST:-localhost}
    depends_on:
      - web
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: domu_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: domu_db
      TZ: UTC
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d domu_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_prod:
